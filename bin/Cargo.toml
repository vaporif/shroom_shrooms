[package]
name = "kingdom"
version.workspace = true
edition.workspace = true
license-file.workspace = true
default-run = "TheFifthKingdom"

[features]
dev = ["bevy/dynamic_linking", "bevy/hotpatching"]
dev-tools = ["dev", "bevy/dev"]
gen-atlas = ["dep:image"]
trace = ["bevy/trace_tracy"]

[dependencies]
bevy = { workspace = true }
bevy_egui = "0.39"
bevy-inspector-egui = "0.36"
bevy_mod_debugdump = "0.15"
clap = { version = "4", features = ["derive"] }
image = { workspace = true, optional = true }
kingdom_core = { workspace = true }
kingdom_world = { workspace = true }
kingdom_growth = { workspace = true }
kingdom_regions = { workspace = true }
kingdom_render = { workspace = true }
kingdom_input = { workspace = true }
kingdom_ai = { workspace = true }
kingdom_fruiting = { workspace = true }
kingdom_ui = { workspace = true }
kingdom_units = { workspace = true }
leafwing-input-manager = { workspace = true }

[[bin]]
name = "TheFifthKingdom"
path = "src/main.rs"

[[bin]]
name = "gen_placeholder_atlas"
path = "src/bin/gen_placeholder_atlas.rs"
required-features = ["gen-atlas"]
